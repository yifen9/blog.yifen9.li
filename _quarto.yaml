  site-url: "https://blog.yifen9.li"
  description: "LI Yifeng's Blog"
  repo-url: https://github.com/yifen9/blog.yifen9.li
  navbar:
    search: true
    left:
      - text: Home
        href: index.qmd
    right:
      - icon: person
        href: https://yifen9.li
      - icon: github
        href: https://github.com/yifen9/blog.yifen9.li
      - icon: rss
        href: index.xml
      
  page-footer:
